services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kode-mukti-store-app
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-kode_mukti_store}
      - DB_USERNAME=${DB_USERNAME:-kodemukti}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-public-storage:/var/www/html/storage/app/public
    ports:
      - "8000:80"
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: kode-mukti-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-kode_mukti_store}
      MYSQL_USER: ${DB_USERNAME:-kodemukti}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  app-storage:
  app-public-storage:

networks:
  app-network:
    driver: bridge
